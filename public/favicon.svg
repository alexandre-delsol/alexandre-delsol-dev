<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond arrondi bleu ardoise -->
  <rect width="32" height="32" rx="6" fill="#07090d"/>

  <!-- Prompt > -->
  <text x="3" y="22" font-family="monospace" font-size="13" font-weight="bold" fill="#1d4ed8">&#62;</text>

  <!-- Curseur clignotant -->
  <rect x="15" y="10" width="7" height="13" rx="1" fill="#60a5fa">
    <animate
      attributeName="opacity"
      values="1;1;0;0;1"
      dur="1.2s"
      repeatCount="indefinite"
      calcMode="discrete"
    />
  </rect>
</svg>
